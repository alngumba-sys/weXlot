<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wexlot — General services contractor for business and government</title>
<meta name="description" content="Wexlot is a general services contractor and registered government vendor delivering software, data, staffing, facilities, logistics, and more under one accountable contract." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<style>
*,*::before,*::after{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:#070C20;color:#EAF0FF;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
:root{
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --text-xs:.75rem;--text-sm:.875rem;--text-base:1rem;--text-lg:1.125rem;
  --text-xl:1.25rem;--text-2xl:1.5rem;--text-3xl:2rem;--text-4xl:2.75rem;--text-5xl:3.75rem;
  --weight-regular:400;--weight-medium:500;--weight-semibold:600;--weight-display:600;
  --leading-tight:1.05;--leading-snug:1.2;--leading-normal:1.5;--leading-relaxed:1.65;
  --tracking-eyebrow:0.14em;--tracking-tight:-0.02em;
  --content-max:1160px;--section-pad-y:6rem;--section-pad-x:2rem;
  --section-pad-y-mobile:4rem;--section-pad-x-mobile:1.5rem;--space-8:3rem;
  --radius-card:4px;--radius-button:2px;--shadow-card:0 2px 12px rgba(0,0,0,.06);
  --ease-out:cubic-bezier(.22,1,.36,1);--dur-fast:200ms;
  /* Legacy light tokens */
  --ink:#0D0D0D;--chalk:#F7F5F0;--slate:#1E2A3A;--copper:#C4622D;--signal:#2563EB;--mist:#E8EDF4;--mid:#6B7280;
  --white-70:rgba(255,255,255,.70);--white-55:rgba(255,255,255,.55);
  --hairline:rgba(13,13,13,.10);--hairline-light:rgba(255,255,255,.14);
  --border:var(--hairline);--border-on-dark:var(--hairline-light);
  /* Dark system */
  --brand-blue:#2563EB;--brand-blue-bright:#3B82F6;--brand-teal:#60A5FA;--brand-purple:#818CF8;
  --surface-1:#111C3D;--surface-2:#16234B;
  --ink-on-dark:#EAF0FF;--muted-on-dark:rgba(234,240,255,.66);--faint-on-dark:rgba(234,240,255,.5);
  --hair-dark:rgba(255,255,255,.10);
  --tint-blue:#0F1C40;--tint-teal:#0C1838;--tint-purple:#0E1A3C;
  --accent-yellow:#FACC15;--accent-yellow-bright:#FDE047;--accent-yellow-ink:#0A1330;
}
.wx-grad-text{color:var(--accent-yellow);}
/* Button lift */
.wx-btn-lift{transition:transform .2s var(--ease-out),box-shadow .2s var(--ease-out),filter .2s var(--ease-out)!important;will-change:transform;}
.wx-btn-lift:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(37,99,235,.28);}
.wx-btn-lift-accent:hover{box-shadow:0 10px 24px rgba(250,204,21,.4);}
/* Card lifts */
.wx-leader-card{transition:transform .22s var(--ease-out),box-shadow .22s var(--ease-out);}
.wx-leader-card:hover{transform:translateY(-5px);box-shadow:0 18px 34px rgba(37,99,235,.22);}
.wx-cap-card{transition:transform .22s var(--ease-out),box-shadow .22s var(--ease-out),border-color .22s var(--ease-out);}
.wx-cap-card:hover{transform:translateY(-5px);box-shadow:0 18px 34px var(--ring,rgba(37,99,235,.22));}
.wx-cap-card:focus-visible{outline:2px solid var(--brand-blue-bright);outline-offset:3px;}
.wx-proof-card{transition:transform .22s var(--ease-out),box-shadow .22s var(--ease-out);}
.wx-proof-card:hover{transform:translateY(-4px);box-shadow:0 14px 28px var(--ring,rgba(37,99,235,.18));}
/* Premium bg textures */
.wx-grid-bg{position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
  background-size:46px 46px;
  -webkit-mask-image:radial-gradient(ellipse 80% 70% at 50% 30%,#000 50%,transparent 100%);
  mask-image:radial-gradient(ellipse 80% 70% at 50% 30%,#000 50%,transparent 100%);}
.wx-grid-dark{background-image:linear-gradient(rgba(255,255,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.07) 1px,transparent 1px);}
.wx-orb{position:absolute;border-radius:50%;filter:blur(72px);pointer-events:none;z-index:0;background:#2B6BF0!important;}
.wx-glass{background:rgba(255,255,255,.05);-webkit-backdrop-filter:blur(16px) saturate(140%);backdrop-filter:blur(16px) saturate(140%);border:1px solid rgba(255,255,255,.13);box-shadow:0 22px 50px rgba(0,0,0,.32);border-radius:18px;}
.wx-glass-dark{background:rgba(255,255,255,.06);-webkit-backdrop-filter:blur(16px) saturate(140%);backdrop-filter:blur(16px) saturate(140%);border:1px solid rgba(255,255,255,.14);box-shadow:0 22px 50px rgba(0,0,0,.30);border-radius:18px;}
.wx-chip{display:inline-flex;align-items:center;gap:.5rem;padding:.4rem .85rem;border-radius:999px;font-family:var(--font-mono);font-size:var(--text-xs);font-weight:600;letter-spacing:.04em;}
/* Animations */
@keyframes wxFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes wxFloatSlow{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
@keyframes wxPulseGlow{0%,100%{opacity:.45;transform:scale(1);}50%{opacity:1;transform:scale(1.25);}}
@keyframes wxDash{to{stroke-dashoffset:-240;}}
@keyframes wxTravel{from{offset-distance:0%;}to{offset-distance:100%;}}
@keyframes wxModalFade{from{opacity:0;}to{opacity:1;}}
@keyframes wxModalRise{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.wx-anim-float{animation:wxFloat 6s ease-in-out infinite;}
.wx-anim-float2{animation:wxFloatSlow 8.5s ease-in-out infinite;}
.wx-node-pulse{animation:wxPulseGlow 3s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
.wx-flow-line{stroke-dasharray:6 9;animation:wxDash 4.5s linear infinite;}
.wx-travel{offset-rotate:0deg;animation:wxTravel 3.4s linear infinite;}
/* Slanted section */
.wx-slant-both{clip-path:polygon(0 2.5vw,100% 0,100% calc(100% - 2.5vw),0 100%);}
/* Nav */
.wx-nav-links{display:flex;}
.wx-burger{display:none!important;}
/* Modal */
@media(max-width:820px){.wx-sw-grid{grid-template-columns:repeat(2,1fr)!important;}}
@media(max-width:520px){.wx-sw-grid{grid-template-columns:1fr!important;}}
/* Tablet */
@media(max-width:1024px){
  .wx-cap-grid{grid-template-columns:repeat(2,1fr)!important;}
  .wx-proofs{grid-template-columns:repeat(2,1fr)!important;}
  .wx-who{grid-template-columns:1fr!important;gap:1.25rem!important;}
  .wx-leaders{grid-template-columns:repeat(3,1fr)!important;}
  .wx-vm{grid-template-columns:1fr!important;}
  .wx-flow-grid{grid-template-columns:repeat(3,1fr)!important;}
  .wx-proof-grid{grid-template-columns:repeat(3,1fr)!important;}
}
/* Mobile */
@media(max-width:768px){
  .wx-nav-links{display:none!important;}
  .wx-burger{display:inline-flex!important;}
  .wx-cap-grid{grid-template-columns:1fr!important;}
  .wx-proofs{grid-template-columns:1fr 1fr!important;}
  .wx-who{grid-template-columns:1fr!important;gap:1.25rem!important;}
  .wx-vm{grid-template-columns:1fr!important;}
  .wx-leaders{grid-template-columns:1fr!important;max-width:420px;margin-left:auto;margin-right:auto;}
  .wx-hero{grid-template-columns:1fr!important;gap:1.5rem!important;}
  .wx-hero-art{height:clamp(260px,70vw,340px)!important;order:-1;}
  .wx-footer{grid-template-columns:1fr!important;text-align:left!important;}
  .wx-footer nav{justify-content:flex-start!important;flex-wrap:wrap;}
  .wx-footer>div:last-child{text-align:left!important;}
  .wx-contact-row{grid-template-columns:1fr!important;}
  .wx-flow-grid{grid-template-columns:repeat(2,1fr)!important;}
  .wx-proof-grid{grid-template-columns:1fr 1fr!important;}
  :root{--section-pad-x:var(--section-pad-x-mobile);--section-pad-y:var(--section-pad-y-mobile);}
}
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto;}
  *{transition:none!important;animation:none!important;}
}
</style>
</head>

const TONES={signal:{color:'var(--signal)',on:'#fff'},copper:{color:'var(--copper)',on:'#fff'},ink:{color:'var(--ink)',on:'#F7F5F0'},white:{color:'#F7F5F0',on:'var(--ink)'}};
const SIZES={sm:{padding:'.5rem .9rem',fontSize:'var(--text-sm)'},md:{padding:'.8rem 1.4rem',fontSize:'var(--text-base)'}};
function Button({variant='filled',tone='signal',size='md',arrow=false,href,onClick,disabled=false,type='button',children,style,className,...rest}){
  const t=TONES[tone]||TONES.signal,s=SIZES[size]||SIZES.md;
  const base={fontFamily:'var(--font-body)',fontWeight:'var(--weight-medium)',fontSize:s.fontSize,lineHeight:1.1,letterSpacing:'.01em',display:'inline-flex',alignItems:'center',gap:'.5em',borderRadius:'var(--radius-button)',cursor:disabled?'not-allowed':'pointer',opacity:disabled?.45:1,textDecoration:'none',whiteSpace:'nowrap'};
  let vs;
  if(variant==='filled')vs={...base,padding:s.padding,background:t.color,color:t.on,border:'1px solid '+t.color};
  else if(variant==='outline')vs={...base,padding:s.padding,background:'transparent',color:t.color,border:'1px solid '+t.color};
  else vs={...base,padding:0,background:'transparent',color:t.color,border:'none',fontWeight:'var(--weight-semibold)'};
  const content=<>{children}{arrow&&<span aria-hidden="true">→</span>}</>;
  const props={style:{...vs,...style},className,onClick:disabled?undefined:onClick,...rest};
  if(href&&!disabled)return <a href={href}{...props}>{content}</a>;
  return <button type={type} disabled={disabled}{...props}>{content}</button>;
}

              const message=(el.message&&el.message.value||'').trim();
              const subject=encodeURIComponent('New enquiry from '+(name||'the Wexlot website'));
              const body=encodeURIComponent('Name: '+name+'\nEmail: '+email+'\nAbout: '+topic+'\n\n'+message+'\n');
              window.location.href='mailto:hello@wexlot.com?subject='+subject+'&body='+body;
              setSent(true);
            }}>
              <div className="wx-contact-row" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1.25rem'}}>
                <Input label="Name" name="name" required placeholder="Jane Mwangi"/>
                <Input label="Email" type="email" name="email" required placeholder="jane@company.com"/>
              </div>
              <Select label="I'm reaching out about:" name="topic" options={['A software or IT project','Facilities, logistics, or staffing services','A federal or government contract','Partnership or investment','Something else']}/>
              <Textarea label="Message" name="message" rows={5} placeholder="Tell us what you're working on…"/>
              <div>
                <Button type="submit" variant="filled" tone="ink" arrow className="wx-btn-lift wx-btn-lift-accent" style={{background:'var(--accent-yellow)',border:'none',color:'var(--accent-yellow-ink)'}}>Send</Button>
              </div>
            </form>
          )}
        </div>
        <div style={{marginTop:'2rem',fontFamily:'var(--font-mono)',fontSize:'var(--text-sm)',color:'var(--muted-on-dark)'}}>We reply within 1 business day</div>
      </div>
    </section>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

setTimeout(()=>{
  if(document.visibilityState!=='visible')return;
  if(window.matchMedia('(prefers-reduced-motion: reduce)').matches)return;
  const els=Array.from(document.querySelectorAll('main > section')).slice(1).concat(Array.from(document.querySelectorAll('footer')));
  els.forEach(el=>{el.style.opacity='0';el.style.transform='translateY(22px)';el.style.transition='opacity .6s var(--ease-out),transform .6s var(--ease-out)';});
  const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='none';io.unobserve(e.target);}});},{threshold:.12});
  els.forEach(el=>io.observe(el));
  setTimeout(()=>els.forEach(el=>{el.style.opacity='1';el.style.transform='none';}),3000);
},200);
</script>
